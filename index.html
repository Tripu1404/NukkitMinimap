<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimapa - Servidor Anarquía</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .interface-layer {
            position: absolute;
            zIndex: 1000;
            pointer-events: none;
        }
        .interactive {
            pointer-events: auto;
        }
        #dimension-selector {
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.85);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-dim {
            display: block;
            width: 120px;
            padding: 8px;
            margin: 5px 0;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s, filter 0.2s;
        }
        .btn-dim:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
        #btn-overworld { background: #2e7d32; }
        #btn-nether { background: #c62828; }
        #btn-end { background: #6a1b9a; }
        
        .player-head {
            border: 2px solid #fff;
            border-radius: 4px;
            box-shadow: 0 0 6px rgba(0,0,0,0.8);
            background: #222;
        }
    </style>
</head>
<body>

    <div id="dimension-selector" class="interface-layer interactive">
        <button id="btn-overworld" class="btn-dim" onclick="changeDimension('overworld')">Overworld</button>
        <button id="btn-nether" class="btn-dim" onclick="changeDimension('nether')">The Nether</button>
        <button id="btn-end" class="btn-dim" onclick="changeDimension('end')">The End</button>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentWorld = 'overworld';
        const DATA_URL = "data.json";

        // Inicializar mapa usando un sistema de coordenadas plano (fácil de adaptar a Minecraft)
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3,
            maxZoom: 3,
            zoomControl: false
        }).setView([0, 0], 0);

        L.control.zoom({ position: 'topleft' }).addTo(map);

        // Capas dedicadas para limpiar el mapa fácilmente al actualizar
        const terrainLayer = L.layerGroup().addTo(map);
        const playersLayer = L.layerGroup().addTo(map);

        function changeDimension(dimension) {
            currentWorld = dimension;
            loadTerrain();
            updatePlayers();
        }

        async function loadTerrain() {
            try {
                const response = await fetch(DATA_URL + "?t=" + new Date().getTime());
                if (!response.ok) return;
                const fullData = await response.json();
                
                const blocks = fullData[currentWorld] || [];
                terrainLayer.clearLayers();

                blocks.forEach(block => {
                    const [x, z, color] = block;
                    // En Leaflet Plano, se asigna [Y, X]. Mapeamos Z de Minecraft al eje Y del mapa.
                    L.rectangle([[z, x], [z + 3, x + 3]], {
                        color: color,
                        weight: 0,
                        fillColor: color,
                        fillOpacity: 1
                    }).addTo(terrainLayer);
                });
            } catch (err) {
                console.error("Esperando a que el servidor genere el archivo data.json...", err);
            }
        }

        async function updatePlayers() {
            try {
                const response = await fetch(DATA_URL + "?t=" + new Date().getTime());
                if (!response.ok) return;
                const fullData = await response.json();
                
                const players = fullData.players || [];
                playersLayer.clearLayers();

                players.forEach(player => {
                    if (player.world !== currentWorld) return;

                    const skinHeadUrl = `https://crafatar.com/avatars/${player.uuid}?size=32&overlay`;
                    const playerIcon = L.icon({
                        iconUrl: skinHeadUrl,
                        iconSize: [32, 32],
                        iconAnchor: [16, 16],
                        className: 'player-head'
                    });

                    const marker = L.marker([player.z, player.x], { icon: playerIcon });
                    
                    marker.bindPopup(`
                        <div style="color:#000; font-family:sans-serif; min-width:120px;">
                            <b style="font-size:14px; color:#111;">${player.name}</b><br><hr style="border:0;border-top:1px solid #ddd; margin:4px 0;">
                            <b>X:</b> ${player.x}<br>
                            <b>Y:</b> ${player.y}<br>
                            <b>Z:</b> ${player.z}
                        </div>
                    `);
                    playersLayer.addLayer(marker);
                });
            } catch (err) {
                // Falla silenciosa si el JSON está ocupado escribiéndose
            }
        }

        // Bucles de refresco visual
        loadTerrain();
        updatePlayers();
        
        setInterval(loadTerrain, 15000); // Lee los bloques nuevos cada 15 segundos
        setInterval(updatePlayers, 5000);  // Actualiza los marcadores de jugadores cada 5 segundos
    </script>
</body>
</html>
